services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  titan:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      HF_HOME: /app/cache/huggingface
      DOCLING_CACHE_DIR: /app/cache/docling
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
    depends_on:
      - qdrant
